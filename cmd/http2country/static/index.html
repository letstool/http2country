<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<title>http2country — Country Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════
   MATERIAL DESIGN 3 — DESIGN TOKENS
══════════════════════════════════════════════════════════════════ */
:root {
  --md-primary:               #9ECAFF;
  --md-on-primary:            #003258;
  --md-primary-container:     #00497D;
  --md-on-primary-container:  #D1E4FF;
  --md-secondary:             #BBC8DA;
  --md-on-secondary:          #263141;
  --md-secondary-container:   #3C4758;
  --md-on-secondary-container:#D7E3F7;
  --md-tertiary:              #4FD8E0;
  --md-on-tertiary:           #00373D;
  --md-tertiary-container:    #004F56;
  --md-on-tertiary-container: #97F0F8;
  --md-error:                 #FFB4AB;
  --md-on-error:              #690005;
  --md-error-container:       #93000A;
  --md-on-error-container:    #FFDAD6;
  --md-success:               #57D9A3;
  --md-success-container:     #00513A;
  --md-on-success-container:  #75F7BC;
  --md-warning:               #FFB74D;
  --md-warning-container:     #5A3900;
  --md-on-warning-container:  #FFD9A0;
  --md-background:               #111318;
  --md-on-background:            #E2E2E6;
  --md-surface:                  #111318;
  --md-on-surface:               #E2E2E6;
  --md-surface-variant:          #43474E;
  --md-on-surface-variant:       #C3C7CF;
  --md-surface-container-lowest: #0C0E11;
  --md-surface-container-low:    #1A1C1E;
  --md-surface-container:        #1E2025;
  --md-surface-container-high:   #28292F;
  --md-surface-container-highest:#33363F;
  --md-outline:         #8D9199;
  --md-outline-variant: #43474E;
  --md-shape-xs:    4px;
  --md-shape-sm:    8px;
  --md-shape-md:    12px;
  --md-shape-lg:    16px;
  --md-shape-full:  100px;
  --md-elev-1: 0 1px 2px rgba(0,0,0,.3),  0 1px 3px 1px rgba(0,0,0,.15);
  --md-elev-2: 0 1px 2px rgba(0,0,0,.3),  0 2px 6px 2px rgba(0,0,0,.15);
  --md-elev-3: 0 1px 3px rgba(0,0,0,.3),  0 4px 8px 3px rgba(0,0,0,.15);
  --md-state-surface-hover: rgba(226,226,230,0.08);
  --md-font:      'Roboto', sans-serif;
  --md-font-mono: 'Roboto Mono', 'Courier New', monospace;

  /* Legacy compat — used in JS-generated HTML */
  --bg:            var(--md-background);
  --surface:       var(--md-surface-container);
  --border:        var(--md-outline-variant);
  --border-hi:     var(--md-outline);
  --accent:        var(--md-primary);
  --accent2:       var(--md-primary);
  --accent-dim:    var(--md-primary-container);
  --text:          var(--md-on-surface);
  --text-dim:      var(--md-on-surface-variant);
  --text-mid:      var(--md-on-surface-variant);
  --ok:            var(--md-success);
  --ok-dim:        var(--md-success-container);
  --warn:          var(--md-warning);
  --warn-dim:      var(--md-warning-container);
  --err:           var(--md-error);
  --err-dim:       var(--md-error-container);
  --green:         var(--md-success);
  --green-dim:     var(--md-success-container);
  --red:           var(--md-error);
  --red-dim:       var(--md-error-container);
  --gold:          var(--md-warning);
  --gold-dim:      var(--md-warning-container);
  --purple:        var(--md-tertiary);
  --purple-dim:    var(--md-tertiary-container);
  --panel-tint:    rgba(158,202,255,0.05);
  --raw-bg:        var(--md-surface-container-lowest);
  --sel-bg:        var(--md-surface-container-high);
  --ring:          var(--md-primary);
  --mono:          var(--md-font-mono);
  --sans:          var(--md-font);
}

[data-theme="light"] {
  --md-primary:               #0061A4;
  --md-on-primary:            #FFFFFF;
  --md-primary-container:     #D1E4FF;
  --md-on-primary-container:  #001D36;
  --md-secondary:             #535F70;
  --md-on-secondary:          #FFFFFF;
  --md-secondary-container:   #D7E3F7;
  --md-on-secondary-container:#101C2B;
  --md-tertiary:              #006A6B;
  --md-on-tertiary:           #FFFFFF;
  --md-tertiary-container:    #9CF1F0;
  --md-on-tertiary-container: #002020;
  --md-error:                 #BA1A1A;
  --md-on-error:              #FFFFFF;
  --md-error-container:       #FFDAD6;
  --md-on-error-container:    #410002;
  --md-success:               #006C4C;
  --md-success-container:     #8AF5C7;
  --md-on-success-container:  #002115;
  --md-warning:               #7B5000;
  --md-warning-container:     #FFDDB3;
  --md-on-warning-container:  #271900;
  --md-background:               #FAFCFF;
  --md-on-background:            #1A1C1E;
  --md-surface:                  #F8F9FF;
  --md-on-surface:               #1A1C1E;
  --md-surface-variant:          #DFE2EB;
  --md-on-surface-variant:       #43474E;
  --md-surface-container-lowest: #FFFFFF;
  --md-surface-container-low:    #F1F3FA;
  --md-surface-container:        #EBEDF4;
  --md-surface-container-high:   #E5E7EE;
  --md-surface-container-highest:#DFE2E8;
  --md-outline:         #73777F;
  --md-outline-variant: #C3C7CF;
  --md-elev-1: 0 1px 2px rgba(0,0,0,.12), 0 1px 3px 1px rgba(0,0,0,.06);
  --md-elev-2: 0 1px 2px rgba(0,0,0,.12), 0 2px 6px 2px rgba(0,0,0,.06);
  --md-elev-3: 0 1px 3px rgba(0,0,0,.12), 0 4px 8px 3px rgba(0,0,0,.06);
  --md-state-surface-hover: rgba(26,28,30,0.08);
  --panel-tint: rgba(0,97,164,0.05);
  --sel-bg: var(--md-surface-container-low);
}

/* ══════════════════════════════════════════════════════════════════
   BASE
══════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.skip-link {
  position: absolute; top: -100px; left: 16px; z-index: 9999;
  background: var(--md-primary); color: var(--md-on-primary);
  font-family: var(--md-font); font-size: .875rem; font-weight: 500;
  padding: 10px 24px; border-radius: var(--md-shape-full);
  text-decoration: none; transition: top .2s;
}
.skip-link:focus { top: 8px; }

:focus-visible { outline: 3px solid var(--md-primary); outline-offset: 2px; border-radius: var(--md-shape-xs); }
:focus:not(:focus-visible) { outline: none; }

body {
  background: var(--md-background); color: var(--md-on-background);
  font-family: var(--md-font); font-size: 1rem; line-height: 1.5;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 16px 80px;
  transition: background .3s, color .3s;
}

/* ── RTL ── */
/* .header-right uses margin-inline-start:auto on base rule — no RTL override needed */
[dir="rtl"] .result-time         { margin-inline-start: auto; margin-left: 0; }
[dir="rtl"] .kv-key              { text-align: right; }
[dir="rtl"] .section-title::after { display: none; }
[dir="rtl"] .section-title::before { content: ''; flex: 1; height: 1px; background: var(--md-outline-variant); }
[dir="rtl"] select               { background-position: left 12px center; padding-left: 36px; padding-right: 14px; }

/* ══════════════════════════════════════════════════════════════════
   TOP APP BAR
══════════════════════════════════════════════════════════════════ */
header {
  width: 100%; max-width: 1200px;
  padding: 16px 0;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
  transition: background .3s;
}

.logo-globe { width: 36px; height: 36px; flex-shrink: 0; }
.logo-globe circle, .logo-globe ellipse, .logo-globe line {
  stroke: var(--md-primary); transition: stroke .3s;
}

.header-text h1 {
  font-family: var(--md-font); font-size: 1.375rem; font-weight: 400;
  color: var(--md-on-surface); transition: color .3s;
}
.header-text p {
  font-size: .75rem; color: var(--md-on-surface-variant);
  letter-spacing: .025em; margin-top: 2px; transition: color .3s;
}

.header-right { margin-inline-start: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── Theme Toggle ── */
.theme-toggle {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  background: var(--md-surface-container-high); border: none;
  border-radius: var(--md-shape-full); padding: 8px 16px 8px 12px;
  color: var(--md-on-surface-variant);
  transition: background .2s, color .2s;
  position: relative; overflow: hidden;
}
.theme-toggle::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: var(--md-state-surface-hover); opacity: 0; transition: opacity .2s;
}
.theme-toggle:hover::after, .theme-toggle:focus-visible::after { opacity: 1; }
.theme-toggle:hover { color: var(--md-on-surface); }
.theme-icon { font-size: .9rem; line-height: 1; }
.theme-track {
  width: 32px; height: 16px; background: var(--md-outline);
  border-radius: var(--md-shape-full); position: relative; flex-shrink: 0; transition: background .3s;
}
.theme-thumb {
  position: absolute; top: 2px; left: 2px; width: 12px; height: 12px;
  border-radius: 50%; background: var(--md-surface-container-highest);
  transition: transform .3s, background .3s;
}
[data-theme="light"] .theme-track { background: var(--md-primary); }
[data-theme="light"] .theme-thumb { background: var(--md-on-primary); transform: translateX(16px); }
.theme-label { font-family: var(--md-font); font-size: .6875rem; font-weight: 500; white-space: nowrap; }

/* ── Custom Language Dropdown ── */
.lang-wrap { position: relative; }
#lang-sel { display: none; }

.lang-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--md-surface-container-high);
  border: 1px solid var(--md-outline); border-radius: var(--md-shape-xs);
  color: var(--md-on-surface-variant);
  font-family: var(--md-font); font-size: .875rem; font-weight: 400;
  padding: 8px 12px; cursor: pointer; outline: none;
  min-height: 40px;
  transition: border-color .2s, color .2s;
  position: relative; overflow: hidden; white-space: nowrap;
}
.lang-btn::after {
  content: ''; position: absolute; inset: 0;
  background: var(--md-state-surface-hover); opacity: 0; transition: opacity .2s;
}
.lang-btn:hover::after, .lang-btn.open::after { opacity: 1; }
.lang-btn:hover, .lang-btn.open { border-color: var(--md-on-surface); color: var(--md-on-surface); }
.lang-btn:focus-visible { border-color: var(--md-primary); border-width: 2px; outline: none; }
.lang-flag-icon { font-size: 1.1rem; line-height: 1; flex-shrink: 0; }
.lang-current-name { font-size: .8125rem; }
.lang-chevron-icon { flex-shrink: 0; color: var(--md-on-surface-variant); transition: transform .2s; }
.lang-btn.open .lang-chevron-icon { transform: rotate(180deg); }

.lang-options {
  position: absolute; top: calc(100% + 4px); right: 0;
  background: var(--md-surface-container-high);
  border-radius: var(--md-shape-sm); box-shadow: var(--md-elev-3);
  min-width: 220px; max-height: 320px; overflow-y: auto;
  z-index: 1000; padding: 4px 0; list-style: none;
  transform-origin: top right;
  animation: menuOpen .15s ease-out;
}
@keyframes menuOpen {
  from { opacity: 0; transform: scale(.95) translateY(-4px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}
.lang-options::-webkit-scrollbar { width: 4px; }
.lang-options::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 2px; }
.lang-option {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; cursor: pointer;
  font-family: var(--md-font); font-size: .875rem; color: var(--md-on-surface);
  position: relative; user-select: none;
}
.lang-option::after {
  content: ''; position: absolute; inset: 0;
  background: var(--md-on-surface); opacity: 0; transition: opacity .12s;
}
.lang-option:hover::after { opacity: .08; }
.lang-option[aria-selected="true"] { background: var(--md-primary-container); color: var(--md-on-primary-container); }
.lang-option[aria-selected="true"]::after { display: none; }
.lang-option .lang-flag-icon { font-size: 1.15rem; }

/* ══════════════════════════════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════════════════════════════ */
main { width: 100%; max-width: 1200px; }

/* ── MD3 Elevated Card ── */
.panel {
  background: var(--md-surface-container);
  border: none; border-radius: var(--md-shape-md);
  overflow: hidden; margin-bottom: 16px;
  box-shadow: var(--md-elev-1);
  transition: background .3s, box-shadow .3s;
}
.panel-head {
  padding: 16px 24px; background: transparent;
  border-bottom: 1px solid var(--md-outline-variant);
  display: flex; align-items: center; gap: 12px;
  font-family: var(--md-font); font-size: 1rem; font-weight: 500;
  color: var(--md-on-surface);
  transition: color .3s, border-color .3s;
}
.panel-head::before {
  content: ''; display: inline-block; width: 3px; height: 20px;
  background: var(--md-primary); border-radius: var(--md-shape-xs);
  flex-shrink: 0; transition: background .3s;
}
.panel-body { padding: 24px; }

/* ── Form ── */
label {
  font-family: var(--md-font); font-size: .75rem; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--md-on-surface-variant); cursor: pointer;
  display: block; margin-bottom: 6px;
}
input {
  background: transparent; border: 1px solid var(--md-outline);
  border-radius: var(--md-shape-xs); color: var(--md-on-surface);
  font-family: var(--md-font-mono); font-size: .9375rem; font-weight: 400;
  padding: 12px 16px; outline: none; width: 100%;
  transition: border-color .2s; min-height: 48px;
}
input:hover:not(:focus-visible) { border-color: var(--md-on-surface); }
input:focus-visible { border-color: var(--md-primary); border-width: 2px; padding: 11px 15px; outline: none; }
input[aria-invalid="true"] { border-color: var(--md-error); border-width: 2px; padding: 11px 15px; }
input::placeholder { color: var(--md-on-surface-variant); opacity: .7; }

.submit-row { margin-top: 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

/* ── MD3 Filled Button ── */
.btn-submit {
  display: flex; align-items: center; gap: 8px;
  background: var(--md-primary); color: var(--md-on-primary); border: none;
  font-family: var(--md-font); font-size: .875rem; font-weight: 500; letter-spacing: .006em;
  padding: 10px 24px; border-radius: var(--md-shape-full);
  cursor: pointer; position: relative; overflow: hidden;
  transition: box-shadow .2s; min-height: 40px; box-shadow: var(--md-elev-1);
}
.btn-submit::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background .2s; }
.btn-submit:hover::after { background: rgba(255,255,255,.08); }
.btn-submit:hover { box-shadow: var(--md-elev-2); }
.btn-submit:active { transform: scale(.98); box-shadow: none; }
.btn-submit:disabled { opacity: .38; cursor: not-allowed; box-shadow: none; }
.btn-submit:focus-visible { outline: 3px solid var(--md-primary); outline-offset: 3px; }

.spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3); border-top-color: var(--md-on-primary);
  border-radius: 50%; animation: spin .7s linear infinite;
}
.loading .spinner { display: block; }
.loading .send-icon { display: none; }
.query-hint { font-family: var(--md-font); font-size: .75rem; color: var(--md-on-surface-variant); }

/* ══════════════════════════════════════════════════════════════════
   RESULTS PANEL — hidden by default
══════════════════════════════════════════════════════════════════ */
#results-panel { display: none; }

/* ── Result meta bar ── */
.result-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.result-time { margin-inline-start: auto; font-family: var(--md-font); font-size: .75rem; color: var(--md-on-surface-variant); }
.result-error { padding: 20px 24px; }

/* ── MD3 Status Badges ── */
.badge {
  font-family: var(--md-font); font-size: .6875rem; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase;
  padding: 4px 12px; border-radius: var(--md-shape-sm); border: none;
}
.badge-error    { background: var(--md-error-container);   color: var(--md-on-error-container); }
.badge-notfound { background: var(--md-warning-container); color: var(--md-on-warning-container); }
.badge-ok       { background: var(--md-success-container); color: var(--md-on-success-container); }

/* ══════════════════════════════════════════════════════════════════
   COUNTRY HERO
══════════════════════════════════════════════════════════════════ */
.country-hero {
  display: flex; align-items: center; gap: 24px;
  padding: 28px 24px; border-bottom: 1px solid var(--md-outline-variant);
  flex-wrap: wrap;
}
.country-flag { font-size: 4rem; line-height: 1; flex-shrink: 0; filter: drop-shadow(0 2px 8px rgba(0,0,0,.3)); }
.country-title { flex: 1; min-width: 200px; }
/* MD3 Headline Medium */
.country-name-common { font-family: var(--md-font); font-size: 1.75rem; font-weight: 400; color: var(--md-on-surface); line-height: 1.2; }
.country-name-official { font-size: .875rem; color: var(--md-on-surface-variant); margin-top: 4px; font-style: italic; }

.country-codes { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
/* MD3 Assist Chip for ISO codes */
.code-badge {
  font-family: var(--md-font-mono); font-size: .75rem; font-weight: 500;
  letter-spacing: .08em; padding: 4px 12px;
  background: var(--md-primary-container); color: var(--md-on-primary-container);
  border-radius: var(--md-shape-sm); border: none;
}

.country-meta-pills { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
/* MD3 Filter Chips for status */
.mpill {
  font-family: var(--md-font); font-size: .6875rem; font-weight: 500;
  letter-spacing: .005em; padding: 4px 12px; border-radius: var(--md-shape-full);
}
.mpill-ok      { background: var(--md-success-container);  color: var(--md-on-success-container); }
.mpill-warn    { background: var(--md-warning-container);  color: var(--md-on-warning-container); }
.mpill-err     { background: var(--md-error-container);    color: var(--md-on-error-container); }
.mpill-neutral { background: var(--md-surface-container-high); color: var(--md-on-surface-variant); }

/* ══════════════════════════════════════════════════════════════════
   DATA GRID — sections
══════════════════════════════════════════════════════════════════ */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 0; border-top: 1px solid var(--md-outline-variant);
}
.data-section {
  padding: 20px 24px;
  border-bottom: 1px solid var(--md-outline-variant);
  border-right: 1px solid var(--md-outline-variant);
}
.data-section:last-child { border-right: none; }

/* MD3 section title with decorative line */
.section-title {
  font-family: var(--md-font); font-size: .75rem; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--md-primary); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--md-outline-variant); }

/* KV list */
.kv-list { display: flex; flex-direction: column; gap: 8px; }
.kv-row  { display: flex; align-items: baseline; gap: 8px; min-height: 22px; }
.kv-key  {
  font-family: var(--md-font); font-size: .6875rem; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--md-on-surface-variant); flex-shrink: 0; min-width: 130px;
}
.kv-val {
  font-family: var(--md-font-mono); font-size: .8125rem; font-weight: 400;
  color: var(--md-on-surface); word-break: break-word;
}
.kv-val.accent { color: var(--md-primary); }
.kv-val.ok     { color: var(--md-success); }
.kv-val.warn   { color: var(--md-warning); }
.kv-val.err    { color: var(--md-error); }
.kv-val.muted  { color: var(--md-on-surface-variant); }

/* Tags — MD3 Assist Chips */
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  font-family: var(--md-font-mono); font-size: .75rem; font-weight: 400;
  padding: 4px 10px; border-radius: var(--md-shape-sm); border: none;
  background: var(--md-secondary-container); color: var(--md-on-secondary-container);
}

/* ══════════════════════════════════════════════════════════════════
   LEGAL GRID
══════════════════════════════════════════════════════════════════ */
.legal-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 6px; margin-top: 4px;
}
/* MD3 chips for legal status */
.legal-item {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--md-font); font-size: .75rem; font-weight: 400;
  padding: 8px 12px; border-radius: var(--md-shape-sm); border: none;
  background: var(--md-surface-container-high); color: var(--md-on-surface-variant);
}
.legal-item.active    { background: var(--md-success-container);  color: var(--md-on-success-container); }
.legal-item.inactive  { opacity: .45; }
.legal-item.sanctioned{ background: var(--md-error-container);    color: var(--md-on-error-container); }
.legal-item.grey-list { background: var(--md-warning-container);  color: var(--md-on-warning-container); }

.li-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.legal-item.active    .li-dot { background: var(--md-on-success-container); }
.legal-item.inactive  .li-dot { background: var(--md-on-surface-variant); }
.legal-item.sanctioned .li-dot{ background: var(--md-on-error-container); }
.legal-item.grey-list .li-dot { background: var(--md-on-warning-container); }

══════════════════════════════════════════════════════════════════ */
.gdp-bar-wrap { margin-top: 8px; }
.gdp-label { font-family: var(--md-font); font-size: .6875rem; color: var(--md-on-surface-variant); margin-bottom: 4px; }
.gdp-bar { height: 4px; background: var(--md-secondary-container); border-radius: 2px; overflow: hidden; }
.gdp-fill { height: 100%; background: var(--md-primary); border-radius: 2px; transition: width .6s ease; }

/* Coordinates */
.coord-display { display: flex; gap: 12px; flex-wrap: wrap; }
.coord-item { font-family: var(--md-font-mono); font-size: .8125rem; color: var(--md-primary); }

/* ══════════════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════════════ */
.visually-hidden { position: absolute!important; width: 1px!important; height: 1px!important; padding: 0!important; margin: -1px!important; overflow: hidden!important; clip: rect(0,0,0,0)!important; white-space: nowrap!important; border: 0!important; }

@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms!important; transition-duration: .01ms!important; } }

const SUPPORTED=Object.keys(LANGS);
function detectLang(){
  for(const l of(navigator.languages||[navigator.language||'en'])){
    if(SUPPORTED.includes(l))return l;
    const b=l.split('-')[0];
    const m=SUPPORTED.find(s=>s===b||s.startsWith(b+'-'));
    if(m)return m;
  }
  return'en';
}

// ── THEME ──────────────────────────────────────────────────────────────
const html=document.documentElement;
const themeBtn=document.getElementById('theme-toggle');
const themeLbl=document.getElementById('theme-label');
const themeIcon=document.getElementById('theme-icon');
let currentLang='en',isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
applyTheme(isDark);
themeBtn.addEventListener('click',()=>{isDark=!isDark;applyTheme(isDark)});
function applyTheme(dark){
  html.dataset.theme=dark?'dark':'light';
  themeBtn.setAttribute('aria-checked',dark?'false':'true');
  const t=LANGS[currentLang]||LANGS.en;
  themeLbl.textContent=dark?t.themeLight:t.themeDark;
  themeIcon.textContent=dark?'☀️':'🌙';
}

// ── LANGUAGE ───────────────────────────────────────────────────────────
function applyLang(lang){
  currentLang=lang;
  const t=LANGS[lang]||LANGS.en;
  const dir=t.dir||'ltr';
  html.lang=lang;html.dir=dir;document.body.dir=dir;
  document.getElementById('skip-link').textContent=t.skipLink;
  document.getElementById('hdr-subtitle').textContent=t.subtitle;
  document.getElementById('ph-params').textContent=t.panelParams;
  document.getElementById('lbl-country').textContent=t.labelCountry;
  document.getElementById('inp-country').placeholder=t.placeholder;
  document.getElementById('inp-hint').textContent=t.hint;
  document.getElementById('btn-send-label').textContent=t.btnSend;
  document.getElementById('ph-results').textContent=t.panelResults;
  document.getElementById('lang-sel-lbl').textContent=dir==='rtl'?'اللغة':'Language';
  applyTheme(isDark);
}
const langSel=document.getElementById('lang-sel');
const initLang=detectLang();
langSel.value=SUPPORTED.includes(initLang)?initLang:'en';
applyLang(langSel.value);
langSel.addEventListener('change',()=>applyLang(langSel.value));

// ── SUBMIT ──────────────────────────────────────────────────────────────
const form=document.getElementById('country-form'),btn=document.getElementById('btn-query'),
      hint=document.getElementById('query-hint'),srStatus=document.getElementById('sr-status');
form.addEventListener('submit',async e=>{
  e.preventDefault();
  const t=LANGS[currentLang]||LANGS.en;
  const q=document.getElementById('inp-country').value.trim();
  const inp=document.getElementById('inp-country');
  if(!q){inp.focus();inp.setAttribute('aria-invalid','true');hint.textContent=t.warnEmpty;hint.style.color='var(--warn)';hint.setAttribute('role','alert');return}
  inp.setAttribute('aria-invalid','false');hint.textContent='';hint.removeAttribute('role');
  btn.disabled=true;btn.classList.add('loading');btn.setAttribute('aria-busy','true');srStatus.textContent=t.loading;
  const t0=performance.now();
  try{
    const res=await fetch('/api/v1/country',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({country:q})});
    const elapsed=((performance.now()-t0)/1000).toFixed(2);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    renderResult(data,q,elapsed);
    srStatus.textContent=data.status==='SUCCESS'?(data.answer?.name_common||q):'';
  }catch(err){renderError(err,q,((performance.now()-t0)/1000).toFixed(2))}
  finally{btn.disabled=false;btn.classList.remove('loading');btn.removeAttribute('aria-busy')}
});
document.getElementById('inp-country').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();form.requestSubmit()}});

// ── RENDER ──────────────────────────────────────────────────────────────
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=n=>n?Number(n).toLocaleString():'—';
const fmtUSD=n=>n>0?'$'+Number(n).toLocaleString(undefined,{maximumFractionDigits:0}):'—';
const fmtPct=n=>n>0?(n.toFixed(1)+'%'):'—';
const fmtArea=n=>n>0?(Number(n).toLocaleString()+' km²'):'—';
const fmtCoord=(lat,lon)=>`${lat>=0?'+':''}${lat.toFixed(4)}° / ${lon>=0?'+':''}${lon.toFixed(4)}°`;

function boolBadge(v,t){
  return v?`<span class="mpill mpill-ok">${esc(t.vYes)}</span>`:`<span class="mpill mpill-neutral">${esc(t.vNo)}</span>`;
}
function legalItem(active,label,variant=''){
  const cls=active?(variant?`legal-item ${variant}`:'legal-item active'):'legal-item inactive';
  return`<div class="${cls}"><span class="li-dot"></span><span>${esc(label)}</span></div>`;
}
function tags(arr){
  if(!arr||!arr.length)return'—';
  return arr.map(s=>`<span class="tag">${esc(s)}</span>`).join('');
}
function kv(key,val,cls=''){return`<div class="kv-row"><span class="kv-key">${esc(key)}</span><span class="kv-val ${cls}">${val}</span></div>`;}

function renderResult(data,q,elapsed){
  const panel=document.getElementById('results-panel'),body=document.getElementById('results-body');
  const t=LANGS[currentLang]||LANGS.en;
  panel.style.display='block';
  if((data.status||'').toUpperCase()==='ERROR'){
    body.innerHTML=`<div class="result-error"><div class="result-meta"><span class="badge badge-error">${esc(t.errBadge)}</span><span class="kv-val muted">${esc(q)}</span><span class="result-time">${elapsed}s</span></div></div>`;
    finalize(panel);return;
  }
  if((data.status||'').toUpperCase()==='NOTFOUND'){
    body.innerHTML=`<div class="result-error"><div class="result-meta"><span class="badge badge-notfound">${esc(t.notfoundBadge)}</span><span class="kv-val muted">${esc(q)}</span><span class="result-time">${elapsed}s</span></div></div>`;
    finalize(panel);return;
  }
  const a=data.answer;
  if(!a){body.innerHTML='';panel.style.display='none';return;}

  const fatfClass=a.legal_fatf?'grey-list':'';
  const ofacClass=a.legal_ofac?'sanctioned':'';
  const euSanctClass=a.legal_eu_sanction?'sanctioned':'';
  const unSanctClass=a.legal_un_sanction?'sanctioned':'';

  let html2=`
<div class="country-hero">
  <div class="country-flag" aria-hidden="true">${esc(a.flag_emoji||'🏳')}</div>
  <div class="country-title">
    <div class="country-name-common">${esc(a.name_common)}</div>
    <div class="country-name-official">${esc(a.name_official)}</div>
    <div class="country-codes">
      <span class="code-badge">${esc(a.iso2)}</span>
      <span class="code-badge">${esc(a.iso3)}</span>
      <span class="code-badge">${esc(a.numeric_code||'—')}</span>
      ${a.fifa?`<span class="code-badge">FIFA ${esc(a.fifa)}</span>`:''}
    </div>
    <div class="country-meta-pills">
      ${a.independent?`<span class="mpill mpill-ok">${esc(t.kIndependent)}</span>`:`<span class="mpill mpill-neutral">Non-independent</span>`}
      ${a.un_member?`<span class="mpill mpill-ok">${esc(t.kUNMember)}</span>`:''}
      ${a.landlocked?`<span class="mpill mpill-warn">${esc(t.kLandlocked)}</span>`:''}
      ${a.legal_eu?`<span class="mpill mpill-ok">EU</span>`:''}
      ${a.legal_schengen?`<span class="mpill mpill-ok">Schengen</span>`:''}
      ${a.legal_ofac?`<span class="mpill mpill-err">OFAC</span>`:''}
      ${a.legal_eu_sanction?`<span class="mpill mpill-err">EU Sanction</span>`:''}
      ${a.legal_un_sanction?`<span class="mpill mpill-err">UN Sanction</span>`:''}
      ${a.legal_fatf?`<span class="mpill mpill-warn">FATF: ${esc(a.legal_fatf)}</span>`:''}
    </div>
  </div>
  <div style="margin-left:auto;font-family:var(--mono);font-size:.65rem;color:var(--text-dim)">${elapsed}s</div>
</div>
<div class="data-grid">

  <div class="data-section">
    <div class="section-title">${esc(t.secIdentity)}</div>
    <div class="kv-list">
      ${kv(t.kISO2,`<span class="accent">${esc(a.iso2)}</span>`,'accent')}
      ${kv(t.kISO3,esc(a.iso3),'accent')}
      ${kv(t.kNumeric,esc(a.numeric_code||t.vNA))}
      ${a.fifa?kv(t.kFIFA,esc(a.fifa)):''}
      ${kv(t.kStatus,esc(a.status||t.vNA))}
      ${kv(t.kIndependent,boolBadge(a.independent,t))}
      ${kv(t.kUNMember,boolBadge(a.un_member,t))}
      ${a.demonym_eng_m?kv(t.kDemonymM,esc(a.demonym_eng_m)):''}
      ${a.demonym_eng_f?kv(t.kDemonymF,esc(a.demonym_eng_f)):''}
    </div>
  </div>

  <div class="data-section">
    <div class="section-title">${esc(t.secGeo)}</div>
    <div class="kv-list">
      ${kv(t.kRegion,esc(a.region||t.vNA),'accent')}
      ${a.subregion?kv(t.kSubregion,esc(a.subregion)):''}
      ${a.capital?kv(t.kCapital,esc(a.capital)):''}
      ${kv(t.kCoords,`<div class="coord-display"><span class="kv-val accent">${a.latitude.toFixed(4)}°N</span><span class="kv-val accent">${a.longitude.toFixed(4)}°E</span></div>`)}
      ${kv(t.kArea,fmtArea(a.area_sq_km))}
      ${kv(t.kLandlocked,boolBadge(a.landlocked,t))}
      ${(a.borders&&a.borders.length)?kv(t.kBorders,`<div class="tag-list">${a.borders.map(b=>`<span class="tag">${esc(b)}</span>`).join('')}</div>`):''}
    </div>
  </div>

  <div class="data-section">
    <div class="section-title">${esc(t.secLanguages)}</div>
    <div class="kv-list">
      ${(a.language_codes&&a.language_codes.length)?kv(t.kLanguages,`<div class="tag-list">${tags(a.language_codes)}</div>`):''}
      ${(a.currency_codes&&a.currency_codes.length)?kv(t.kCurrencies,`<div class="tag-list">${tags(a.currency_codes)}</div>`):''}
      ${(a.tld&&a.tld.length)?kv(t.kTLD,`<div class="tag-list">${tags(a.tld)}</div>`):''}
      ${(a.calling_codes&&a.calling_codes.length)?kv(t.kCalling,`<div class="tag-list">${tags(a.calling_codes)}</div>`):''}
    </div>
  </div>

  <div class="data-section">
    <div class="section-title">${esc(t.secDemographics)}</div>
    <div class="kv-list">
      ${a.gdp_current_usd>0?kv(t.kGDP,`<span class="kv-val ok">${fmtUSD(a.gdp_current_usd)}</span>`):''}
      ${a.gdp_per_capita_usd>0?kv(t.kGDPPC,`<span class="kv-val ok">${fmtUSD(a.gdp_per_capita_usd)}</span>`):''}
      ${a.gdp_year?kv('GDP Year',esc(a.gdp_year)):''}
      ${a.gini_value>0?kv(t.kGINI,`<span class="kv-val warn">${a.gini_value.toFixed(1)}${a.gini_year?' ('+a.gini_year+')':''}</span>`):''}
    </div>
  </div>

  <div class="data-section" style="grid-column:1/-1">
    <div class="section-title">${esc(t.secLegal)}</div>
    <div class="legal-grid">
      ${legalItem(a.legal_eu,t.kEU)}
      ${legalItem(a.legal_eea,t.kEEA)}
      ${legalItem(a.legal_schengen,t.kSchengen)}
      ${legalItem(a.legal_gdpr,t.kGDPR)}
      ${legalItem(a.legal_data_residency,t.kDataRes)}
      ${legalItem(a.legal_digital_vat,t.kDigVAT)}
      ${legalItem(a.legal_ofac,t.kOFAC,ofacClass)}
      ${legalItem(a.legal_eu_sanction,t.kEUSanct,euSanctClass)}
      ${legalItem(a.legal_un_sanction,t.kUNSanct,unSanctClass)}
    </div>
    ${a.legal_vat_rate>0?`<div style="margin-top:12px" class="kv-list">
      ${kv(t.kVAT,`<span class="kv-val accent">${fmtPct(a.legal_vat_rate)}${a.legal_vat_name?' ('+esc(a.legal_vat_name)+')':''}</span>`)}
    </div>`:''}
    ${a.legal_fatf?`<div style="margin-top:8px" class="kv-list">${kv(t.kFATF,`<span class="kv-val warn">${esc(a.legal_fatf)}</span>`)}</div>`:''}
  </div>

</div>`;
  body.innerHTML=html2;
  finalize(panel);
}

function renderError(err,q,elapsed){
  const panel=document.getElementById('results-panel'),body=document.getElementById('results-body');
  const t=LANGS[currentLang]||LANGS.en;
  panel.style.display='block';
  body.innerHTML=`<div class="result-error"><div class="result-meta"><span class="badge badge-error">${esc(t.errBadge)}</span><span class="kv-val muted">${esc(q)}</span><span class="result-time">${elapsed}s</span></div><div style="color:var(--err);font-family:var(--mono);font-size:.78rem">${esc(String(err))}</div></div>`;
  finalize(panel);
}

function finalize(panel){panel.scrollIntoView({behavior:'smooth',block:'nearest'});panel.setAttribute('tabindex','-1');panel.focus({preventScroll:true})}

// ══════════════════════════════════════════════════════════════════
// CUSTOM LANGUAGE DROPDOWN
// ══════════════════════════════════════════════════════════════════
const LANG_META = {
  ar:      { flag: '🇸🇦', name: 'العربية' },
  bn:      { flag: '🇧🇩', name: 'বাংলা' },
  de:      { flag: '🇩🇪', name: 'Deutsch' },
  en:      { flag: '🇬🇧', name: 'English' },
  es:      { flag: '🇪🇸', name: 'Español' },
  fr:      { flag: '🇫🇷', name: 'Français' },
  hi:      { flag: '🇮🇳', name: 'हिन्दी' },
  id:      { flag: '🇮🇩', name: 'Bahasa Indonesia' },
  ja:      { flag: '🇯🇵', name: '日本語' },
  ko:      { flag: '🇰🇷', name: '한국어' },
  'pt-BR': { flag: '🇧🇷', name: 'Português (BR)' },
  ru:      { flag: '🇷🇺', name: 'Русский' },
  ur:      { flag: '🇵🇰', name: 'اردو' },
  vi:      { flag: '🇻🇳', name: 'Tiếng Việt' },
  'zh-CN': { flag: '🇨🇳', name: '中文' },
};

const _langBtn         = document.getElementById('lang-btn');
const _langOptions     = document.getElementById('lang-options');
const _langCurrentFlag = document.getElementById('lang-current-flag');
const _langCurrentName = document.getElementById('lang-current-name');

Object.entries(LANG_META).forEach(([code, meta]) => {
  const li = document.createElement('li');
  li.className = 'lang-option';
  li.setAttribute('role', 'option');
  li.setAttribute('aria-selected', 'false');
  li.dataset.value = code;
  li.innerHTML = `<span class="lang-flag-icon">${meta.flag}</span><span>${meta.name}</span>`;
  li.addEventListener('click', e => { e.stopPropagation(); _pickLang(code); _closeLangMenu(); });
  _langOptions.appendChild(li);
});

function _updateLangDisplay(code) {
  const meta = LANG_META[code] || LANG_META.en;
  _langCurrentFlag.textContent = meta.flag;
  _langCurrentName.textContent = meta.name;
  _langOptions.querySelectorAll('[role=option]').forEach(opt => {
    opt.setAttribute('aria-selected', opt.dataset.value === code ? 'true' : 'false');
  });
}

function _pickLang(code) {
  langSel.value = code;
  _updateLangDisplay(code);
  applyLang(code);
}

function _openLangMenu() {
  _langOptions.hidden = false;
  _langBtn.setAttribute('aria-expanded', 'true');
  _langBtn.classList.add('open');
  const sel = _langOptions.querySelector('[aria-selected="true"]');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

function _closeLangMenu() {
  _langOptions.hidden = true;
  _langBtn.setAttribute('aria-expanded', 'false');
  _langBtn.classList.remove('open');
}

_langBtn.addEventListener('click', e => {
  e.stopPropagation();
  _langOptions.hidden ? _openLangMenu() : _closeLangMenu();
});

_langOptions.addEventListener('keydown', e => {
  const items = Array.from(_langOptions.querySelectorAll('.lang-option'));
  const idx = items.indexOf(document.activeElement);
  if (e.key === 'ArrowDown') { e.preventDefault(); items[(idx + 1) % items.length].focus(); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); items[(idx - 1 + items.length) % items.length].focus(); }
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.activeElement.click(); }
  if (e.key === 'Escape') { _closeLangMenu(); _langBtn.focus(); }
  if (e.key === 'Tab') _closeLangMenu();
});
_langBtn.addEventListener('keydown', e => {
  if (e.key === 'Escape') _closeLangMenu();
  if ((e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') && _langOptions.hidden) {
    e.preventDefault(); _openLangMenu();
    _langOptions.querySelector('.lang-option')?.focus();
  }
});

document.addEventListener('click', _closeLangMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') _closeLangMenu(); });

_updateLangDisplay(langSel.value);
</script>
